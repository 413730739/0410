<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動態顏色與大小</title>
    <style>
      body {
        position: relative;
        overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
        margin: 40px auto;
      padding: 40px 20px;
      max-width: 700px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      }
      body > *:not(.bubble-container) {
        position: relative;
        z-index: 1;
      }
      .bubble-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.65);
        opacity: 0.8;
        animation: floatUp linear infinite;
      }
      .bubble:nth-child(1) { left: 5%; width: 50px; height: 50px; animation-duration: 14s; animation-delay: 0s; }
      .bubble:nth-child(2) { left: 22%; width: 32px; height: 32px; animation-duration: 10s; animation-delay: 2s; }
      .bubble:nth-child(3) { left: 38%; width: 60px; height: 60px; animation-duration: 17s; animation-delay: 1s; }
      .bubble:nth-child(4) { left: 55%; width: 24px; height: 24px; animation-duration: 12s; animation-delay: 3s; }
      .bubble:nth-child(5) { left: 70%; width: 42px; height: 42px; animation-duration: 16s; animation-delay: 4s; }
      .bubble:nth-child(6) { left: 85%; width: 28px; height: 28px; animation-duration: 11s; animation-delay: 5s; }
      .bubble:nth-child(7) { left: 45%; width: 36px; height: 36px; animation-duration: 13s; animation-delay: 6s; }
      .bubble:nth-child(8) { left: 90%; width: 48px; height: 48px; animation-duration: 18s; animation-delay: 2.5s; }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 0.8; }
        100% { transform: translateY(-130vh) scale(1.2); opacity: 0.1; }
      }
      .menu-button {
        display: inline-block;
        margin-bottom: 24px;
        padding: 10px 22px;
        background: rgba(255, 255, 255, 0.8);
        color: #1a73e8;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(5px);
      }
      .menu-button:hover {
        background: #fff;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      }
      #app {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border: 1px solid rgba(255,255,255,0.5);
        text-align: center;
      }
      h1 { color: #1e293b; text-align: center; margin-bottom: 24px; }
      input {
        width: 100%;
        padding: 14px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        margin-bottom: 20px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      input:focus { outline: none; border-color: #3b82f6; }
      p { font-size: 1.2rem; color: #334155; margin-bottom: 15px; }
      button {
        padding: 12px 24px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }
      button:hover { background: #2563eb; transform: scale(1.05); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
      .big { font-size: 2.5rem; font-weight: 800; color: #1e293b; transition: all 0.3s ease; }
      }
    </style>
</head>
<body>
  <div class="bubble-container">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>
  <a class="menu-button" href="../index.html">主選單</a>
  <h1 style="text-align:center; color:#1e293b">🎨 動態樣式</h1>
    <div id="app">
  <label style="display:block; margin-bottom:8px; color:#64748b">輸入顏色名稱或 HEX (如: blue, #ff0000)</label>
  <input v-model="color" placeholder="輸入顏色" />
  <div style="background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #f1f5f9;">
    <p :style="{ color: color }">這段文字的顏色會隨輸入改變</p>
    <p :class="{ big: isBig }">動態文字大小</p>
  </div>
  <button @click="isBig = !isBig">切換大小狀態</button>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>
</style>

<script>
Vue.createApp({
  data() {
    return {
      color: "black",
      isBig: false
    }
  }
}).mount("#app")
</script>

</body>
</html>
