<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打折含稅計算</title>
    <style>
      body {
        position: relative;
      overflow-x: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
        margin: 40px auto;
      padding: 60px 20px;
      max-width: 600px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      }
      body > *:not(.bubble-container) {
        position: relative;
        z-index: 1;
      }
      .bubble-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.65);
        opacity: 0.8;
        animation: floatUp linear infinite;
      }
      .bubble:nth-child(1) { left: 5%; width: 50px; height: 50px; animation-duration: 14s; animation-delay: 0s; }
      .bubble:nth-child(2) { left: 22%; width: 32px; height: 32px; animation-duration: 10s; animation-delay: 2s; }
      .bubble:nth-child(3) { left: 38%; width: 60px; height: 60px; animation-duration: 17s; animation-delay: 1s; }
      .bubble:nth-child(4) { left: 55%; width: 24px; height: 24px; animation-duration: 12s; animation-delay: 3s; }
      .bubble:nth-child(5) { left: 70%; width: 42px; height: 42px; animation-duration: 16s; animation-delay: 4s; }
      .bubble:nth-child(6) { left: 85%; width: 28px; height: 28px; animation-duration: 11s; animation-delay: 5s; }
      .bubble:nth-child(7) { left: 45%; width: 36px; height: 36px; animation-duration: 13s; animation-delay: 6s; }
      .bubble:nth-child(8) { left: 90%; width: 48px; height: 48px; animation-duration: 18s; animation-delay: 2.5s; }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 0.8; }
        100% { transform: translateY(-130vh) scale(1.2); opacity: 0.1; }
      }
      .menu-button {
        display: inline-block;
        margin-bottom: 24px;
        padding: 10px 22px;
        background: rgba(255, 255, 255, 0.8);
        color: #1a73e8;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(5px);
      }
    #app {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1.1rem;
      margin-bottom: 25px;
      box-sizing: border-box;
    }
    .result-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #f1f5f9;
    }
    p { margin: 10px 0; color: #475569; font-size: 1.1rem; }
    span.highlight { color: #2563eb; font-weight: bold; font-size: 1.3rem; }
    </style>
</head>
<body>
  <a class="menu-button" href="../index.html">主選單</a>
  <h1 style="text-align:center; color:#1e293b">💰 財務計算器</h1>
    <div id="app">
  <label style="display:block; margin-bottom:8px; color:#64748b">請輸入商品原價</label>
  <input v-model.number="price" type="number" placeholder="例如: 1000" />
  <div class="result-card">
    <p>商品原價：<span class="highlight">{{ price }}</span> 元</p>
    <p>打八折後：<span class="highlight">{{ discounted }}</span> 元</p>
    <p style="border-top: 1px solid #eee; padding-top: 10px; margin-top: 15px; font-weight: bold;">
      最終含稅價 (5%)：<span style="color:#e11d48; font-size:1.5rem">{{ withTax }}</span> 元
    </p>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
Vue.createApp({
  data() {
    return { price: 100 }
  },
  computed: {
    discounted() {
      return Math.round(this.price * 0.8)
    },
    withTax() {
      return Math.round(this.discounted * 1.05)
    }
  }
}).mount("#app")
</script>

</body>
</html>
