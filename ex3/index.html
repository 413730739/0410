<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點擊計數器</title>
    <style>
      body {
        position: relative;
        overflow-x: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 40px auto;
        padding: 40px 20px;
        max-width: 700px;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
      }
      body > *:not(.bubble-container) {
        position: relative;
        z-index: 1;
      }
      .bubble-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.65);
        opacity: 0.8;
        animation: floatUp linear infinite;
      }
      .bubble:nth-child(1) { left: 5%; width: 50px; height: 50px; animation-duration: 14s; animation-delay: 0s; }
      .bubble:nth-child(2) { left: 22%; width: 32px; height: 32px; animation-duration: 10s; animation-delay: 2s; }
      .bubble:nth-child(3) { left: 38%; width: 60px; height: 60px; animation-duration: 17s; animation-delay: 1s; }
      .bubble:nth-child(4) { left: 55%; width: 24px; height: 24px; animation-duration: 12s; animation-delay: 3s; }
      .bubble:nth-child(5) { left: 70%; width: 42px; height: 42px; animation-duration: 16s; animation-delay: 4s; }
      .bubble:nth-child(6) { left: 85%; width: 28px; height: 28px; animation-duration: 11s; animation-delay: 5s; }
      .bubble:nth-child(7) { left: 45%; width: 36px; height: 36px; animation-duration: 13s; animation-delay: 6s; }
      .bubble:nth-child(8) { left: 90%; width: 48px; height: 48px; animation-duration: 18s; animation-delay: 2.5s; }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 0.8; }
        100% { transform: translateY(-130vh) scale(1.2); opacity: 0.1; }
      }
      .menu-button {
        display: inline-block;
        margin-bottom: 24px;
        padding: 10px 22px;
        background: rgba(255, 255, 255, 0.8);
        color: #1a73e8;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(5px);
      }
      .menu-button:hover {
        background: #fff;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      }
      .btn-primary {
        padding: 12px 28px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }
      .btn-primary:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
      .btn-secondary {
        padding: 12px 28px;
        background: #f1f5f9;
        color: #64748b;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-secondary:hover { background: #e2e8f0; }
      .count-display { font-size: 3rem; font-weight: 800; color: #1e293b; margin: 20px 0; }
      #app {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        text-align: center;
      }
    </style>
</head>
<body>
  <div class="bubble-container">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>
  <a class="menu-button" href="../index.html">主選單</a>
  <h1 style="text-align: center; color: #1e293b;">點擊計數器</h1>
  <div id="app">
  <div class="count-display">{{ count }}</div>
  <p style="color: #64748b;">次點擊紀錄</p>
  <button class="btn-primary" @click="addOne">點我 +1</button>
  <button class="btn-secondary" @click="reset">重設</button>
</div>
<!-- 引入 Vue -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
Vue.createApp({
  data() {
    return { count: 0 }
  },
  methods: {
    addOne() {
      this.count++
    },
    reset() {
      this.count = 0
    }
  }
}).mount("#app")
</script>

</body>
</html>
